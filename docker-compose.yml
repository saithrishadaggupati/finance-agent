version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: .
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./data:/app/data
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  frontend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "pip install streamlit requests plotly pandas --quiet &&
             streamlit run frontend/streamlit_app.py --server.port 8502 --server.address 0.0.0.0"
    ports:
      - "8502:8502"
    depends_on:
      - backend
    env_file:
      - .env
